<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <form id="loginForm">
        <div class="input-group">
          <label for="email">Email ID</label>
          <input type="email" id="email" required placeholder="name@domain.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required placeholder="••••••••">
            <span class="password-toggle" onclick="togglePassword('password', this)">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <div id="errorMsg" style="color: var(--danger); margin-top: 1rem; display: none;"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
